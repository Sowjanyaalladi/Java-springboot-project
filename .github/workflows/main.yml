name: Build Spring Boot

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          cd backend
          mvn clean package -DskipTests

      - name: Install JAR
        run: |
          sudo mkdir -p /opt/datastore
          sudo cp backend/target/*.jar /opt/datastore/datastore.jar

      - name: Restart Service
        run: |
          sudo systemctl restart datastore
          sudo systemctl status datastore --no-pager
